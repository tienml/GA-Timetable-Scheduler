<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GA Timetable Scheduler</title>

  <!-- Bootstrap + Icons + Chart.js CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="assets/css/style.css?v=final-fix-1" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-logo">GA</div>
        <div>
          <div class="brand-title">GA Timetable</div>
          <div class="brand-title">Scheduler</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <button class="nav-item active" data-page="dashboard"><i class="bi bi-house-door"></i><span>Tổng quan</span></button>
        <button class="nav-item" data-page="teachers"><i class="bi bi-people"></i><span>Giáo viên</span></button>
        <button class="nav-item" data-page="subjects"><i class="bi bi-journal-bookmark"></i><span>Môn học</span></button>
        <button class="nav-item" data-page="studentGroups"><i class="bi bi-person-lines-fill"></i><span>Nhóm sinh viên</span></button>
        <button class="nav-item" data-page="rooms"><i class="bi bi-door-open"></i><span>Phòng học</span></button>
        <button class="nav-item" data-page="equipment"><i class="bi bi-pc-display"></i><span>Thiết bị</span></button>
        <button class="nav-item" data-page="timeSlots"><i class="bi bi-clock"></i><span>Khung giờ</span></button>
        <button class="nav-item" data-page="courseClasses"><i class="bi bi-mortarboard"></i><span>Lớp học phần</span></button>
        <button class="nav-item" data-page="relationships"><i class="bi bi-exclamation-triangle"></i><span>Ràng buộc</span></button>
        <button class="nav-item" data-page="generate"><i class="bi bi-calendar2-plus"></i><span>Tạo thời khóa biểu</span></button>
        <button class="nav-item" data-page="results"><i class="bi bi-calendar-check"></i><span>Kết quả</span></button>
      </nav>

      <button class="collapse-btn" id="toggleSidebar"><i class="bi bi-arrow-left-circle"></i><span>Thu gọn</span></button>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="topbar">
        <div class="d-flex align-items-center gap-3">
          <button class="icon-btn d-lg-none" id="mobileMenu"><i class="bi bi-list"></i></button>
          <button class="icon-btn d-none d-lg-inline-flex" id="desktopMenu"><i class="bi bi-list"></i></button>
          <div class="page-title-mini"><i class="bi bi-stack"></i><span id="headerTitle">Tổng quan</span></div>
        </div>
      </header>

      <section class="content" id="app"></section>
    </main>
  </div>

  <!-- MODAL FORM -->
  <div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content border-0 rounded-4 shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title" id="formModalTitle">Thêm dữ liệu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <form id="entityForm">
          <div class="modal-body">
            <div id="formFields" class="row g-3"></div>
            <div id="formAlert" class="mt-3"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2-circle me-1"></i>Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- TOAST AREA -->
  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="assets/js/app.js?v=final-fix-1"></script>
</body>
</html>
